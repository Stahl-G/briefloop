default_model = "opencode-go"
language = "zh"

[agent]
auto_plan = "ask"

# Flash 负责日常执行，Pro 只在复杂任务中担任规划器
planner_model = "opencode-go-pro"

[[providers]]
name        = "opencode-go"
kind        = "openai"
base_url    = "https://opencode.ai/zen/go/v1"
model       = "deepseek-v4-flash"
api_key_env = "OPENCODE_GO_API_KEY"

[[providers]]
name        = "opencode-go-pro"
kind        = "openai"
base_url    = "https://opencode.ai/zen/go/v1"
model       = "deepseek-v4-pro"
api_key_env = "OPENCODE_GO_API_KEY"
