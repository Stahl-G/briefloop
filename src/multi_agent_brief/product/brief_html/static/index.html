<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BriefLoop — 质量面板 · Brief Pages</title>
    <!--
      brief_html static shell — consumed by brief_html.render, which replaces
      the three placeholder comments marked in this file (style in <head>,
      data + script at the end of <body>) with the inlined style, the embedded
      JSON payload, and the inlined script.
      Derived (MIT) from the BriefLoop quality-panel prototype
      (github.com/Stahl-G/briefloop-prototypes). No external references;
      read-only projection surface, no write affordance.
    -->
    <!-- brief-html:style -->
</head>
<body>

    <header class="qp-topbar">
        <div class="qp-topbar-inner">
            <div class="brand-block">
                <div class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 32 32" width="18" height="18">
                        <rect width="32" height="32" rx="7" fill="#05351d"/>
                        <path d="M8.2 13a8.3 8.3 0 0 1 13.3-4.1M20 6.8l2.1 2.4-3.1.9M23.8 19a8.3 8.3 0 0 1-13.3 4.1M12 25.2l-2.1-2.4 3.1-.9" fill="none" stroke="#4faf62" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <rect x="13" y="13" width="6" height="6" rx="1.3" fill="none" stroke="#f2f5f1" stroke-width="1.6"/>
                        <path d="M14.5 16h3" stroke="#f2f5f1" stroke-width="1.4" stroke-linecap="round"/>
                    </svg>
                </div>
                <span class="brand-word">BriefLoop</span>
            </div>
            <span class="proto-banner" data-i18n="top_badge">只读静态导出 · 无任何写入能力</span>
            <div class="lang-select">
                <button id="btn-lang-toggle" class="lang-select-btn" type="button" aria-haspopup="listbox" aria-expanded="false"><span id="lang-current">中文</span><span class="lang-caret" aria-hidden="true">▾</span></button>
                <ul id="lang-menu" class="lang-menu" role="listbox" hidden>
                    <li role="option" tabindex="0" aria-selected="true" data-lang="zh">中文</li>
                    <li role="option" tabindex="0" aria-selected="false" data-lang="en">English</li>
                </ul>
            </div>
        </div>
    </header>

    <main class="qp-main" id="qp-main">
        <!-- sections injected by app.js -->
    </main>

    <!-- brief-html:data -->
    <!-- brief-html:script -->
</body>
</html>
