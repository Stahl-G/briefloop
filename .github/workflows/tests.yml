name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  workflow_dispatch:

concurrency:
  group: >-
    tests-${{ github.event_name == 'pull_request' &&
    format('pr-{0}', github.event.pull_request.number) ||
    format('{0}-{1}-{2}', github.event_name, github.ref, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  changes:
    name: Change classification
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      run_candidate: ${{ steps.classify.outputs.run_candidate }}
      test_matrix: ${{ steps.classify.outputs.test_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}
          fetch-depth: 0

      - id: classify
        name: Classify changed files
        shell: python
        run: |
          import os
          import json
          import subprocess
          from pathlib import Path

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          github_sha = os.environ["CANDIDATE_SHA"]
          base = ""

          if event_name == "pull_request":
              base = "${{ github.event.pull_request.base.sha }}"
          elif event_name == "push":
              base = "${{ github.event.before }}"

          if not base or set(base) == {"0"}:
              base = f"{github_sha}^"

          result = subprocess.run(
              ["git", "diff", "--name-only", base, github_sha],
              check=True,
              text=True,
              capture_output=True,
          )
          changed = [line.strip() for line in result.stdout.splitlines() if line.strip()]

          def is_docs_path(path: str) -> bool:
              root_docs = {
                  "README.md",
                  "README_en.md",
                  "README.zh-CN.md",
                  "CHANGELOG.md",
                  "AGENTS.md",
                  "CLAUDE.md",
              }
              return path.startswith("docs/") or path in root_docs

          pr_is_draft = (
              event_name == "pull_request"
              and "${{ github.event.pull_request.draft }}" == "true"
          )
          run_candidate = event_name != "pull_request" or not pr_is_draft
          # Only a non-draft PR may take the docs-only route. Push-to-main and
          # exceptional manual dispatch remain full shadow validations.
          docs_only = (
              event_name == "pull_request"
              and run_candidate
              and bool(changed)
              and all(is_docs_path(path) for path in changed)
          )
          test_matrix = {
              "os": ["macos-latest", "windows-latest"],
              "python-version": ["3.12"],
          }

          print("Changed files:")
          for path in changed:
              print(f"- {path}")
          print(f"docs_only={str(docs_only).lower()}")
          print(f"run_candidate={str(run_candidate).lower()}")
          print(f"test_matrix={test_matrix}")

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as f:
              f.write(f"docs_only={str(docs_only).lower()}\n")
              f.write(f"run_candidate={str(run_candidate).lower()}\n")
              f.write(f"test_matrix={json.dumps(test_matrix, separators=(',', ':'))}\n")

  docs-only:
    name: Docs-only smoke
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install docs safety dependencies
        run: python -m pip install pyyaml

      - name: Public safety check
        run: python scripts/check_public_safety.py

      - name: Terminology check
        run: python scripts/check_terms.py

      - name: Version consistency check
        run: python scripts/check_version_consistency.py

      - name: Release consistency check
        run: python scripts/check_release_consistency.py --no-tag

      - name: Check roadmap docs
        shell: bash
        run: |
          set -euo pipefail
          test -s docs/roadmap.md
          test -s docs/roadmap.zh-CN.md
          grep -q "Orchestrator Contracts And Feedback Loop" docs/roadmap.md
          grep -q "Planning Privacy" docs/roadmap.md
          grep -q "司乐师 契约 And Feedback Loop" docs/roadmap.zh-CN.md
          grep -q "规划保密边界" docs/roadmap.zh-CN.md
          python3 - <<'PY'
          from pathlib import Path

          forbidden = [
              "schema_version",
              "tests/test_",
              "feedback_issues.json",
              "repair_plan.json",
              "golden_cases",
              "policy_material_terms",
          ]
          for file_name in ("docs/roadmap.md", "docs/roadmap.zh-CN.md"):
              text = Path(file_name).read_text(encoding="utf-8")
              hits = [token for token in forbidden if token in text]
              if hits:
                  raise SystemExit(
                      f"{file_name} contains internal planning details: {', '.join(hits)}"
                  )
          PY

  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.test_matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Setup script smoke (Windows PowerShell)
        if: runner.os == 'Windows'
        run: .\scripts\setup.ps1

      - name: Setup script smoke (macOS/Linux)
        if: runner.os != 'Windows'
        run: bash scripts/setup.sh

      - name: Install
        shell: bash
        run: |
          set -x
          python -V
          python -m pip --version
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python files
        run: python -m compileall -q src tests scripts

      - name: Ruff check
        run: python -m ruff check .

      - name: Terminology check
        run: python scripts/check_terms.py

      - name: Tests
        run: python -m pytest -q -x -n auto --dist worksteal

      - name: Agent config check
        run: python scripts/generate_agent_configs.py --check

      - name: Release consistency check
        run: python scripts/check_release_consistency.py

      - name: Version consistency check
        run: python scripts/check_version_consistency.py

      - name: Capabilities check
        run: python scripts/check_capabilities.py

      - name: Runtime asset parity check
        run: python scripts/check_runtime_asset_parity.py

      - name: Failure diagnostics
        if: failure()
        run: |
          echo "=== failure diagnostics ==="
          echo "OS: ${{ matrix.os }}"
          echo "Python: ${{ matrix.python-version }}"
          python -V || true
          python -m pip list --format=columns || true
          echo "=== end diagnostics ==="

      - name: Refresh example input dates
        shell: python
        run: |
          import json
          from datetime import date, timedelta
          from pathlib import Path
          yesterday = (date.today() - timedelta(days=1)).isoformat()
          for p in Path("tests/fixtures/basic_market_brief/input").glob("*.json"):
              data = json.loads(p.read_text(encoding="utf-8"))
              data["published_at"] = yesterday
              p.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

      - name: CLI smoke
        run: |
          briefloop version
          python scripts/ci/smoke_pipeline.py tests/fixtures/basic_market_brief/config.yaml tests/fixtures/basic_market_brief/input output/basic_market_brief

  non-dev-smoke:
    name: Non-dev install smoke
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install without dev extras
        run: python -m pip install .

      - name: Version check
        run: briefloop version

      - name: Evaluation cases smoke
        run: |
          briefloop eval-cases validate --json
          briefloop eval-cases run --json

      - name: Init workspace
        run: |
          briefloop init /tmp/mabw-ci-smoke \
            --language zh-CN \
            --company "CI Test" \
            --industry manufacturing \
            --title "Smoke Brief" \
            --task-objective "Prepare a public-safe manufacturing smoke brief." \
            --audience management \
            --cadence weekly \
            --source-profile conservative \
            --web-search-mode disabled
          echo "- Manufacturing output improved as supply chain disruption eased in the latest reporting period." > /tmp/mabw-ci-smoke/input/smoke.md

      - name: Doctor check
        run: |
          briefloop run --workspace /tmp/mabw-ci-smoke --runtime codex
          briefloop runtime next --workspace /tmp/mabw-ci-smoke > /tmp/mabw-ci-smoke/runtime_action.json
          python - <<'PY'
          import json
          from pathlib import Path
          action = json.loads(Path("/tmp/mabw-ci-smoke/runtime_action.json").read_text())
          assert action["schema_version"] == "briefloop.core_run_next_action.v2"
          assert action["effect_kind"] == "doctor_check"
          assert action["action_fingerprint"]
          PY
          briefloop runtime apply \
            --workspace /tmp/mabw-ci-smoke \
            --action runtime_action.json > /tmp/mabw-ci-smoke/doctor_result.json
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path("/tmp/mabw-ci-smoke/doctor_result.json").read_text())
          assert result["status"] == "committed"
          assert result["receipt"]["transaction_id"]
          PY

      - name: SQLite runtime receipt check
        run: |
          briefloop runtime next --workspace /tmp/mabw-ci-smoke > /tmp/mabw-ci-smoke/next_action.json
          python - <<'PY'
          import json
          from pathlib import Path
          workspace = Path("/tmp/mabw-ci-smoke")
          action = json.loads((workspace / "next_action.json").read_text())
          assert action["schema_version"] == "briefloop.core_run_next_action.v2"
          assert action["store_revision"] == 2
          assert (workspace / "briefloop.db").is_file()
          legacy = (
              "agent_handoff.json",
              "runtime_manifest.json",
              "workflow_state.json",
              "artifact_registry.json",
              "event_log.jsonl",
          )
          intermediate = workspace / "output" / "intermediate"
          assert all(not (intermediate / name).exists() for name in legacy)
          PY

      - name: Package-only runtime asset boundary
        run: |
          before=$(sha256sum /tmp/mabw-ci-smoke/briefloop.db | cut -d' ' -f1)
          set +e
          briefloop run --workspace /tmp/mabw-ci-smoke --runtime opencode > /tmp/runtime-install.log 2>&1
          rc=$?
          set -e
          cat /tmp/runtime-install.log
          test "$rc" -ne 0
          grep -q "runtime_adapter_unsupported" /tmp/runtime-install.log
          after=$(sha256sum /tmp/mabw-ci-smoke/briefloop.db | cut -d' ' -f1)
          test "$before" = "$after"

      - name: Legacy controls fail closed
        run: |
          before=$(sha256sum /tmp/mabw-ci-smoke/briefloop.db | cut -d' ' -f1)
          set +e
          briefloop controls show --workspace /tmp/mabw-ci-smoke --json > /tmp/controls.log 2>&1
          rc=$?
          set -e
          cat /tmp/controls.log
          test "$rc" -ne 0
          grep -q "runtime_command_unsupported" /tmp/controls.log
          after=$(sha256sum /tmp/mabw-ci-smoke/briefloop.db | cut -d' ' -f1)
          test "$before" = "$after"
          test ! -e /tmp/mabw-ci-smoke/output/intermediate/control_selections.json

      - name: Assert prepare stays removed
        run: |
          before=$(sha256sum /tmp/mabw-ci-smoke/briefloop.db | cut -d' ' -f1)
          set +e
          briefloop prepare --config /tmp/mabw-ci-smoke/config.yaml > /tmp/prepare.log 2>&1
          rc=$?
          set -e
          cat /tmp/prepare.log
          test "$rc" -ne 0
          grep -q "runtime_command_unsupported" /tmp/prepare.log
          after=$(sha256sum /tmp/mabw-ci-smoke/briefloop.db | cut -d' ' -f1)
          test "$before" = "$after"

      - name: Wheel install smoke
        run: |
          python -m pip install build
          python -m build
          python -m venv /tmp/mabw-wheel-smoke
          /tmp/mabw-wheel-smoke/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/mabw-wheel-smoke/bin/briefloop new industry-weekly /tmp/mabw-wheel-ws --web-search-mode disabled
          /tmp/mabw-wheel-smoke/bin/briefloop run --workspace /tmp/mabw-wheel-ws --runtime codex
          /tmp/mabw-wheel-smoke/bin/briefloop runtime next --workspace /tmp/mabw-wheel-ws > /tmp/mabw-wheel-ws/runtime_action.json
          test -s /tmp/mabw-wheel-ws/briefloop.db
          /tmp/mabw-wheel-smoke/bin/briefloop eval-cases run --json

      - name: Wheel CLI entrypoint parity
        run: |
          # briefloop is the public CLI; multi-agent-brief is the retained
          # compatibility entrypoint. Both must behave identically.
          test -x /tmp/mabw-wheel-smoke/bin/briefloop
          test -x /tmp/mabw-wheel-smoke/bin/multi-agent-brief
          /tmp/mabw-wheel-smoke/bin/briefloop version > /tmp/cli-version-public.txt
          /tmp/mabw-wheel-smoke/bin/multi-agent-brief version > /tmp/cli-version-compat.txt
          diff /tmp/cli-version-public.txt /tmp/cli-version-compat.txt
          set +e
          mismatch=0
          for subcmd in "--help" "run --help" "init --help" "state --help" "finalize --help"; do
            /tmp/mabw-wheel-smoke/bin/briefloop $subcmd >/dev/null 2>&1; rc_public=$?
            /tmp/mabw-wheel-smoke/bin/multi-agent-brief $subcmd >/dev/null 2>&1; rc_compat=$?
            if [ "$rc_public" -ne "$rc_compat" ]; then
              echo "exit-code mismatch for '$subcmd': briefloop=$rc_public multi-agent-brief=$rc_compat"
              mismatch=1
            fi
          done
          set -e
          test "$mismatch" -eq 0
          /tmp/mabw-wheel-smoke/bin/briefloop eval-cases list --json > /tmp/eval-list-public.json
          /tmp/mabw-wheel-smoke/bin/multi-agent-brief eval-cases list --json > /tmp/eval-list-compat.json
          diff /tmp/eval-list-public.json /tmp/eval-list-compat.json

  llm-decide-smoke:
    name: llm_decide + doctor + sources decide smoke
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Init llm_decide workspace
        run: |
          briefloop init /tmp/mabw-llm \
            --language en-US \
            --company "Sample Company" \
            --industry manufacturing \
            --title "Sample Brief" \
            --task-objective "Prepare a public-safe manufacturing source brief." \
            --audience management \
            --cadence weekly \
            --source-profile llm_decide \
            --web-search-mode disabled
          echo "- Placeholder input" > /tmp/mabw-llm/input/placeholder.md

      - name: Doctor check
        run: |
          briefloop run --workspace /tmp/mabw-llm --runtime codex
          briefloop runtime next --workspace /tmp/mabw-llm > /tmp/mabw-llm/runtime_action.json
          briefloop runtime apply \
            --workspace /tmp/mabw-llm \
            --action runtime_action.json > /tmp/mabw-llm/doctor_result.json
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path("/tmp/mabw-llm/doctor_result.json").read_text())
          assert result["status"] == "committed"
          assert result["receipt"]["transaction_id"]
          PY

      - name: Source planner next action
        run: |
          briefloop runtime next --workspace /tmp/mabw-llm > /tmp/mabw-llm/next_action.json
          python - <<'PY'
          import json
          from pathlib import Path
          action = json.loads(Path("/tmp/mabw-llm/next_action.json").read_text())
          assert action["schema_version"] == "briefloop.core_run_next_action.v2"
          assert action["action_kind"] == "delegate"
          assert action["role_id"] == "source-planner"
          assert action["stage_id"] == "source-discovery"
          PY

      - name: Assert SQLite authority exists
        run: |
          test -s /tmp/mabw-llm/briefloop.db
          test ! -e /tmp/mabw-llm/output/intermediate/runtime_manifest.json
          test ! -e /tmp/mabw-llm/output/intermediate/workflow_state.json

      - name: Add input and assert prepare stays removed
        run: |
          cd /tmp/mabw-llm
          echo "- Manufacturing sector grew 5 percent." > input/smoke.md
          before=$(sha256sum briefloop.db | cut -d' ' -f1)
          set +e
          briefloop prepare --config config.yaml > /tmp/llm-prepare.log 2>&1
          rc=$?
          set -e
          cat /tmp/llm-prepare.log
          test "$rc" -ne 0
          grep -q "runtime_command_unsupported" /tmp/llm-prepare.log
          after=$(sha256sum briefloop.db | cut -d' ' -f1)
          test "$before" = "$after"

  onboarding-smoke:
    name: Onboarding (--from-onboarding) smoke
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Create onboarding.json
        run: |
          cat > /tmp/onboarding.json << 'JSON'
          {
            "target": "/tmp/mabw-onboarding",
            "company_or_org": "Sample Company",
            "industry_or_theme": "manufacturing",
            "task_objective": "Prepare a public-safe manufacturing source brief.",
            "audience_plain": "management team",
            "source_style_plain": "reliable research",
            "language_plain": "English",
            "cadence_plain": "weekly",
            "search_backend_plain": "none",
            "must_watch": ["policy", "competitors", "market"]
          }
          JSON

      - name: Init from onboarding
        run: |
          briefloop init --from-onboarding /tmp/onboarding.json
          echo "- Placeholder input" > /tmp/mabw-onboarding/input/placeholder.md

      - name: Doctor check
        run: |
          briefloop run --workspace /tmp/mabw-onboarding --runtime codex
          briefloop runtime next --workspace /tmp/mabw-onboarding > /tmp/mabw-onboarding/runtime_action.json
          briefloop runtime apply \
            --workspace /tmp/mabw-onboarding \
            --action runtime_action.json > /tmp/mabw-onboarding/doctor_result.json
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path("/tmp/mabw-onboarding/doctor_result.json").read_text())
          assert result["status"] == "committed"
          assert result["receipt"]["transaction_id"]
          assert Path("/tmp/mabw-onboarding/briefloop.db").is_file()
          PY

      - name: Assert prepare stays removed
        run: |
          cd /tmp/mabw-onboarding
          echo "- Manufacturing output improved." > input/smoke.md
          before=$(sha256sum briefloop.db | cut -d' ' -f1)
          set +e
          briefloop prepare --config config.yaml > /tmp/onboarding-prepare.log 2>&1
          rc=$?
          set -e
          cat /tmp/onboarding-prepare.log
          test "$rc" -ne 0
          grep -q "runtime_command_unsupported" /tmp/onboarding-prepare.log
          after=$(sha256sum briefloop.db | cut -d' ' -f1)
          test "$before" = "$after"

  docx-smoke:
    name: DOCX output smoke
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install with docx extra
        run: python -m pip install -e ".[dev,docx]"

      - name: Init demo workspace
        run: briefloop new industry-weekly /tmp/mabw-docx --web-search-mode disabled

      - name: Bootstrap SQLite Codex runtime
        run: briefloop run --workspace /tmp/mabw-docx --runtime codex

      - name: Render deterministic DOCX fixture
        shell: python
        run: |
          from pathlib import Path
          from multi_agent_brief.outputs.docx import render_docx
          source = Path("/tmp/mabw-docx-renderer-fixture.md")
          target = Path("/tmp/mabw-docx-rendered.docx")
          source.write_text(
              "# Smoke Brief\n\nDeterministic public-safe renderer fixture.\n",
              encoding="utf-8",
          )
          assert render_docx(source, target, title="Smoke Brief") == target
          assert target.stat().st_size > 0

      - name: Legacy finalize fails closed
        run: |
          before_db=$(sha256sum /tmp/mabw-docx/briefloop.db | cut -d' ' -f1)
          before_docx=$(sha256sum /tmp/mabw-docx-rendered.docx | cut -d' ' -f1)
          set +e
          briefloop finalize --config /tmp/mabw-docx/config.yaml > /tmp/docx-finalize.log 2>&1
          rc=$?
          set -e
          cat /tmp/docx-finalize.log
          test "$rc" -ne 0
          grep -q "runtime_command_unsupported" /tmp/docx-finalize.log
          after_db=$(sha256sum /tmp/mabw-docx/briefloop.db | cut -d' ' -f1)
          after_docx=$(sha256sum /tmp/mabw-docx-rendered.docx | cut -d' ' -f1)
          test "$before_db" = "$after_db"
          test "$before_docx" = "$after_docx"

      - name: Assert brief.docx exists
        shell: bash
        run: |
          test -s /tmp/mabw-docx-rendered.docx
          test ! -e /tmp/mabw-docx/output/intermediate/finalize_report.json

  golden-smoke:
    name: Subagent-first tool smoke
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install with docx extra
        run: python -m pip install -e ".[dev,docx]"

      - name: Fresh SQLite Codex launch smoke
        run: |
          python scripts/check_launch_smoke.py --json > /tmp/launch-smoke.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("/tmp/launch-smoke.json").read_text())
          assert payload["ok"] is True
          checks = {item["id"]: item for item in payload["steps"]}
          assert checks["sqlite_runtime_artifacts"]["ok"] is True
          assert checks["sqlite_runtime_next_action"]["ok"] is True
          PY

      - name: Inactive CodeBuddy adapter fails closed
        run: |
          python scripts/check_codebuddy_adapter_smoke.py --json > /tmp/codebuddy-smoke.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("/tmp/codebuddy-smoke.json").read_text())
          assert payload["ok"] is True
          assert payload["runtime_effect"] == "readiness_check_only"
          PY

  merge-gate:
    name: >-
      ${{ github.event_name == 'pull_request' && github.event.pull_request.draft &&
      'Draft gate' || 'Merge gate' }}
    if: always()
    needs:
      - changes
      - docs-only
      - test
      - non-dev-smoke
      - llm-decide-smoke
      - onboarding-smoke
      - docx-smoke
      - golden-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Require the complete applicable candidate route
        shell: python
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_CANDIDATE: ${{ needs.changes.outputs.run_candidate }}
          DOCS_ONLY: ${{ needs.changes.outputs.docs_only }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          DOCS_RESULT: ${{ needs['docs-only'].result }}
          TEST_RESULT: ${{ needs.test.result }}
          NON_DEV_RESULT: ${{ needs['non-dev-smoke'].result }}
          LLM_DECIDE_RESULT: ${{ needs['llm-decide-smoke'].result }}
          ONBOARDING_RESULT: ${{ needs['onboarding-smoke'].result }}
          DOCX_RESULT: ${{ needs['docx-smoke'].result }}
          GOLDEN_RESULT: ${{ needs['golden-smoke'].result }}
        run: |
          import os

          results = {
              "changes": os.environ.get("CHANGES_RESULT", ""),
              "docs-only": os.environ.get("DOCS_RESULT", ""),
              "test": os.environ.get("TEST_RESULT", ""),
              "non-dev-smoke": os.environ.get("NON_DEV_RESULT", ""),
              "llm-decide-smoke": os.environ.get("LLM_DECIDE_RESULT", ""),
              "onboarding-smoke": os.environ.get("ONBOARDING_RESULT", ""),
              "docx-smoke": os.environ.get("DOCX_RESULT", ""),
              "golden-smoke": os.environ.get("GOLDEN_RESULT", ""),
          }

          def require(expected: dict[str, str]) -> None:
              mismatches = {
                  name: {"expected": wanted, "actual": results.get(name, "")}
                  for name, wanted in expected.items()
                  if results.get(name) != wanted
              }
              if mismatches:
                  raise SystemExit(f"Merge gate dependency mismatch: {mismatches}")

          require({"changes": "success"})
          run_candidate = os.environ.get("RUN_CANDIDATE", "")
          docs_only = os.environ.get("DOCS_ONLY", "")
          heavy_jobs = {
              "test": "success",
              "non-dev-smoke": "success",
              "llm-decide-smoke": "success",
              "onboarding-smoke": "success",
              "docx-smoke": "success",
              "golden-smoke": "success",
          }

          if os.environ.get("EVENT_NAME") == "pull_request" and run_candidate == "false":
              require({
                  "docs-only": "skipped",
                  **{name: "skipped" for name in heavy_jobs},
              })
              print("Draft PR: heavy candidate gate intentionally not run.")
          elif run_candidate != "true":
              raise SystemExit("Merge gate did not receive a candidate classification.")
          elif docs_only == "true":
              require({
                  "docs-only": "success",
                  **{name: "skipped" for name in heavy_jobs},
              })
              print("Docs-only candidate route passed.")
          elif docs_only == "false":
              require({"docs-only": "skipped", **heavy_jobs})
              print("Full supported-platform candidate route passed.")
          else:
              raise SystemExit("Merge gate did not receive a docs-only classification.")
