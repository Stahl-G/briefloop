name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  workflow_dispatch:

concurrency:
  group: >-
    tests-${{ github.event_name == 'pull_request' &&
    format('pr-{0}', github.event.pull_request.number) ||
    format('{0}-{1}-{2}', github.event_name, github.ref, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  changes:
    name: Change classification
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      run_candidate: ${{ steps.classify.outputs.run_candidate }}
      test_matrix: ${{ steps.classify.outputs.test_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}
          fetch-depth: 0

      - id: classify
        name: Classify changed files
        shell: python
        run: |
          import os
          import json
          import subprocess
          from pathlib import Path

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          github_sha = os.environ["CANDIDATE_SHA"]
          base = ""

          if event_name == "pull_request":
              base = "${{ github.event.pull_request.base.sha }}"
          elif event_name == "push":
              base = "${{ github.event.before }}"

          if not base or set(base) == {"0"}:
              base = f"{github_sha}^"

          result = subprocess.run(
              ["git", "diff", "--name-only", base, github_sha],
              check=True,
              text=True,
              capture_output=True,
          )
          changed = [line.strip() for line in result.stdout.splitlines() if line.strip()]

          def is_docs_path(path: str) -> bool:
              root_docs = {
                  "README.md",
                  "README_en.md",
                  "README.zh-CN.md",
                  "CHANGELOG.md",
                  "AGENTS.md",
                  "CLAUDE.md",
              }
              return path.startswith("docs/") or path in root_docs

          pr_is_draft = (
              event_name == "pull_request"
              and "${{ github.event.pull_request.draft }}" == "true"
          )
          run_candidate = event_name != "pull_request" or not pr_is_draft
          # Only a non-draft PR may take the docs-only route. Push-to-main and
          # exceptional manual dispatch remain full shadow validations.
          docs_only = (
              event_name == "pull_request"
              and run_candidate
              and bool(changed)
              and all(is_docs_path(path) for path in changed)
          )
          test_matrix = {
              "os": ["macos-latest", "windows-latest"],
              "python-version": ["3.12"],
          }

          print("Changed files:")
          for path in changed:
              print(f"- {path}")
          print(f"docs_only={str(docs_only).lower()}")
          print(f"run_candidate={str(run_candidate).lower()}")
          print(f"test_matrix={test_matrix}")

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as f:
              f.write(f"docs_only={str(docs_only).lower()}\n")
              f.write(f"run_candidate={str(run_candidate).lower()}\n")
              f.write(f"test_matrix={json.dumps(test_matrix, separators=(',', ':'))}\n")

  docs-only:
    name: Docs-only smoke
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install docs safety dependencies
        run: python -m pip install pyyaml

      - name: Public safety check
        run: python scripts/check_public_safety.py

      - name: Terminology check
        run: python scripts/check_terms.py

      - name: Version consistency check
        run: python scripts/check_version_consistency.py

      - name: Release consistency check
        run: python scripts/check_release_consistency.py --no-tag

      - name: Check roadmap docs
        shell: bash
        run: |
          set -euo pipefail
          test -s docs/roadmap.md
          test -s docs/roadmap.zh-CN.md
          grep -q "Orchestrator Contracts And Feedback Loop" docs/roadmap.md
          grep -q "Planning Privacy" docs/roadmap.md
          grep -q "司乐师 契约 And Feedback Loop" docs/roadmap.zh-CN.md
          grep -q "规划保密边界" docs/roadmap.zh-CN.md
          python3 - <<'PY'
          from pathlib import Path

          forbidden = [
              "schema_version",
              "tests/test_",
              "feedback_issues.json",
              "repair_plan.json",
              "golden_cases",
              "policy_material_terms",
          ]
          for file_name in ("docs/roadmap.md", "docs/roadmap.zh-CN.md"):
              text = Path(file_name).read_text(encoding="utf-8")
              hits = [token for token in forbidden if token in text]
              if hits:
                  raise SystemExit(
                      f"{file_name} contains internal planning details: {', '.join(hits)}"
                  )
          PY

  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.test_matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Setup script smoke (Windows PowerShell)
        if: runner.os == 'Windows'
        run: .\scripts\setup.ps1

      - name: Setup script smoke (macOS/Linux)
        if: runner.os != 'Windows'
        run: bash scripts/setup.sh

      - name: Install
        shell: bash
        run: |
          set -x
          python -V
          python -m pip --version
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python files
        run: python -m compileall -q src tests scripts

      - name: Ruff check
        run: python -m ruff check .

      - name: Terminology check
        run: python scripts/check_terms.py

      - name: Tests
        run: python -m pytest -q -x

      - name: Agent config check
        run: python scripts/generate_agent_configs.py --check

      - name: Release consistency check
        run: python scripts/check_release_consistency.py

      - name: Version consistency check
        run: python scripts/check_version_consistency.py

      - name: Capabilities check
        run: python scripts/check_capabilities.py

      - name: Runtime asset parity check
        run: python scripts/check_runtime_asset_parity.py

      - name: Failure diagnostics
        if: failure()
        run: |
          echo "=== failure diagnostics ==="
          echo "OS: ${{ matrix.os }}"
          echo "Python: ${{ matrix.python-version }}"
          python -V || true
          python -m pip list --format=columns || true
          echo "=== end diagnostics ==="

      - name: Refresh example input dates
        shell: python
        run: |
          import json
          from datetime import date, timedelta
          from pathlib import Path
          yesterday = (date.today() - timedelta(days=1)).isoformat()
          for p in Path("tests/fixtures/basic_market_brief/input").glob("*.json"):
              data = json.loads(p.read_text(encoding="utf-8"))
              data["published_at"] = yesterday
              p.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

      - name: CLI smoke
        run: |
          multi-agent-brief version
          python scripts/ci/smoke_pipeline.py tests/fixtures/basic_market_brief/config.yaml tests/fixtures/basic_market_brief/input output/basic_market_brief

  non-dev-smoke:
    name: Non-dev install smoke
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install without dev extras
        run: python -m pip install .

      - name: Version check
        run: multi-agent-brief version

      - name: Evaluation cases smoke
        run: |
          multi-agent-brief eval-cases validate --json
          multi-agent-brief eval-cases run --json

      - name: Init workspace
        run: |
          multi-agent-brief init /tmp/mabw-ci-smoke \
            --language zh-CN \
            --company "CI Test" \
            --industry manufacturing \
            --title "Smoke Brief" \
            --audience management \
            --cadence weekly \
            --source-profile conservative \
            --web-search-mode disabled
          echo "- Manufacturing output improved as supply chain disruption eased in the latest reporting period." > /tmp/mabw-ci-smoke/input/smoke.md

      - name: Doctor check
        run: multi-agent-brief doctor --config /tmp/mabw-ci-smoke/config.yaml

      - name: Runtime handoff check
        run: |
          multi-agent-brief run --workspace /tmp/mabw-ci-smoke --runtime operator --skip-doctor
          multi-agent-brief state show --workspace /tmp/mabw-ci-smoke --json
          multi-agent-brief state check --workspace /tmp/mabw-ci-smoke --json
          test -f /tmp/mabw-ci-smoke/output/intermediate/agent_handoff.json
          test -f /tmp/mabw-ci-smoke/output/intermediate/runtime_manifest.json
          test -f /tmp/mabw-ci-smoke/output/intermediate/workflow_state.json
          test -f /tmp/mabw-ci-smoke/output/intermediate/artifact_registry.json
          test -f /tmp/mabw-ci-smoke/output/intermediate/event_log.jsonl
          test -f /tmp/mabw-ci-smoke/output/intermediate/audience_profile_snapshot.md
          test -f /tmp/mabw-ci-smoke/output/intermediate/orchestrator_control_switchboard.json
          test ! -f /tmp/mabw-ci-smoke/output/intermediate/control_selections.json
          test ! -f /tmp/mabw-ci-smoke/output/intermediate/claim_ledger.json
          test ! -f /tmp/mabw-ci-smoke/output/brief.md
          test ! -f /tmp/mabw-ci-smoke/output/source_appendix.md

      - name: Packaged topology handoff smoke
        run: python scripts/ci/smoke_packaged_topology_handoff.py

      - name: Package-only runtime asset boundary
        run: |
          cd /tmp
          set +e
          multi-agent-brief runtime install --workspace /tmp/mabw-ci-smoke --runtime opencode > /tmp/runtime-install.log 2>&1
          rc=$?
          set -e
          cat /tmp/runtime-install.log
          test "$rc" -ne 0
          grep -q "source-clone-only" /tmp/runtime-install.log

      - name: Control switchboard smoke
        run: |
          multi-agent-brief controls show --workspace /tmp/mabw-ci-smoke --json
          multi-agent-brief controls validate --workspace /tmp/mabw-ci-smoke --json
          multi-agent-brief controls select \
            --workspace /tmp/mabw-ci-smoke \
            --control quality_gates \
            --selection enable \
            --reason "Use quality gates before finalize." \
            --json
          test -f /tmp/mabw-ci-smoke/output/intermediate/control_selections.json
          test ! -f /tmp/mabw-ci-smoke/output/intermediate/quality_gate_report.json

      - name: Assert prepare stays removed
        run: python scripts/ci/smoke_pipeline.py /tmp/mabw-ci-smoke/config.yaml /tmp/mabw-ci-smoke/input

      - name: Wheel install smoke
        run: |
          python -m pip install build
          python -m build
          python -m venv /tmp/mabw-wheel-smoke
          /tmp/mabw-wheel-smoke/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/mabw-wheel-smoke/bin/multi-agent-brief init /tmp/mabw-wheel-ws --demo --force --web-search-mode disabled
          /tmp/mabw-wheel-smoke/bin/multi-agent-brief run --workspace /tmp/mabw-wheel-ws --runtime operator --skip-doctor
          /tmp/mabw-wheel-smoke/bin/multi-agent-brief eval-cases run --json

  llm-decide-smoke:
    name: llm_decide + doctor + sources decide smoke
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Init llm_decide workspace
        run: |
          multi-agent-brief init /tmp/mabw-llm \
            --language en-US \
            --company "Sample Company" \
            --industry manufacturing \
            --title "Sample Brief" \
            --audience management \
            --cadence weekly \
            --source-profile llm_decide \
            --web-search-mode disabled
          echo "- Placeholder input" > /tmp/mabw-llm/input/placeholder.md

      - name: Doctor check
        run: cd /tmp/mabw-llm && multi-agent-brief doctor --config config.yaml

      - name: Sources decide (template)
        run: cd /tmp/mabw-llm && multi-agent-brief sources decide --config config.yaml

      - name: Assert source_candidates.yaml exists
        run: test -s /tmp/mabw-llm/source_candidates.yaml

      - name: Add input and assert prepare stays removed
        run: |
          cd /tmp/mabw-llm
          echo "- Manufacturing sector grew 5 percent." > input/smoke.md
          python $GITHUB_WORKSPACE/scripts/ci/smoke_pipeline.py config.yaml input

  onboarding-smoke:
    name: Onboarding (--from-onboarding) smoke
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Create onboarding.json
        run: |
          cat > /tmp/onboarding.json << 'JSON'
          {
            "target": "/tmp/mabw-onboarding",
            "company_or_org": "Sample Company",
            "industry_or_theme": "manufacturing",
            "audience_plain": "management team",
            "source_style_plain": "reliable research",
            "language_plain": "English",
            "cadence_plain": "weekly",
            "search_backend_plain": "none",
            "must_watch": ["policy", "competitors", "market"]
          }
          JSON

      - name: Init from onboarding
        run: |
          multi-agent-brief init --from-onboarding /tmp/onboarding.json
          echo "- Placeholder input" > /tmp/mabw-onboarding/input/placeholder.md

      - name: Doctor check
        run: cd /tmp/mabw-onboarding && multi-agent-brief doctor --config config.yaml

      - name: Assert prepare stays removed
        run: |
          cd /tmp/mabw-onboarding
          echo "- Manufacturing output improved." > input/smoke.md
          python $GITHUB_WORKSPACE/scripts/ci/smoke_pipeline.py config.yaml input

  docx-smoke:
    name: DOCX output smoke
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install with docx extra
        run: python -m pip install -e ".[dev,docx]"

      - name: Init demo workspace
        run: multi-agent-brief init /tmp/mabw-docx --demo --force --web-search-mode disabled

      - name: Enable docx in config
        shell: python
        run: |
          from pathlib import Path
          import yaml
          p = Path("/tmp/mabw-docx/config.yaml")
          cfg = yaml.safe_load(p.read_text(encoding="utf-8"))
          output = cfg.setdefault("output", {})
          fmts = output.get("formats", ["markdown"])
          if "docx" not in fmts:
              fmts.append("docx")
              output["formats"] = fmts
              p.write_text(yaml.dump(cfg, sort_keys=False, allow_unicode=True), encoding="utf-8")

      - name: Create audited markdown fixture
        run: |
          mkdir -p /tmp/mabw-docx/output/intermediate
          printf '# Smoke Brief\n\nSubagents produced this audited statement [src:CLM-1].\n' > /tmp/mabw-docx/output/intermediate/audited_brief.md
          cat > /tmp/mabw-docx/output/intermediate/claim_ledger.json <<'JSON'
          [
            {
              "claim_id": "CLM-1",
              "statement": "Subagents produced this audited statement.",
              "source_id": "SRC-1",
              "evidence_text": "Subagents produced this audited statement.",
              "source_url": "https://example.com/docx-smoke",
              "source_type": "web_search",
              "metadata": {
                "source_title": "DOCX Smoke Source",
                "publisher": "Example",
                "source_category": "news_media"
              }
            }
          ]
          JSON

      - name: Finalize reader outputs
        run: multi-agent-brief finalize --config /tmp/mabw-docx/config.yaml

      - name: Assert brief.docx exists
        shell: bash
        run: |
          test -s /tmp/mabw-docx/output/brief.md
          ! grep -q '\[src:' /tmp/mabw-docx/output/brief.md
          test -s /tmp/mabw-docx/output/brief.docx

  golden-smoke:
    name: Subagent-first tool smoke
    needs: changes
    if: >-
      needs.changes.outputs.run_candidate == 'true' &&
      needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install with docx extra
        run: python -m pip install -e ".[dev,docx]"

      # --- Reference demo (init --demo) ---
      - name: Init demo workspace
        run: multi-agent-brief init /tmp/golden-demo --demo --force --web-search-mode disabled

      - name: Assert reference demo prepare stays removed
        run: python scripts/ci/smoke_reference_workflow.py /tmp/golden-demo

      # --- Basic example demo ---
      - name: Refresh example input dates
        shell: python
        run: |
          import json
          from datetime import date, timedelta
          from pathlib import Path
          yesterday = (date.today() - timedelta(days=1)).isoformat()
          for p in Path("tests/fixtures/basic_market_brief/input").glob("*.json"):
              data = json.loads(p.read_text(encoding="utf-8"))
              data["published_at"] = yesterday
              p.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

      - name: Assert basic example prepare stays removed
        run: python scripts/ci/smoke_pipeline.py tests/fixtures/basic_market_brief/config.yaml tests/fixtures/basic_market_brief/input /tmp/golden-basic/output

      # --- Onboarding demo ---
      - name: Create onboarding.json
        run: |
          cat > /tmp/golden-onboarding.json << 'JSON'
          {
            "target": "/tmp/golden-onboarding",
            "company_or_org": "Golden Test Corp",
            "industry_or_theme": "manufacturing",
            "audience_plain": "management team",
            "source_style_plain": "reliable research",
            "language_plain": "English",
            "cadence_plain": "weekly",
            "search_backend_plain": "none",
            "must_watch": ["policy", "competitors", "market"]
          }
          JSON

      - name: Init from onboarding
        run: |
          multi-agent-brief init --from-onboarding /tmp/golden-onboarding.json
          echo "- Manufacturing output improved with new automation line deployment." > /tmp/golden-onboarding/input/smoke.md

      - name: Assert onboarding prepare stays removed
        run: python scripts/ci/smoke_pipeline.py /tmp/golden-onboarding/config.yaml /tmp/golden-onboarding/input /tmp/golden-onboarding/output

  merge-gate:
    name: >-
      ${{ github.event_name == 'pull_request' && github.event.pull_request.draft &&
      'Draft gate' || 'Merge gate' }}
    if: always()
    needs:
      - changes
      - docs-only
      - test
      - non-dev-smoke
      - llm-decide-smoke
      - onboarding-smoke
      - docx-smoke
      - golden-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Require the complete applicable candidate route
        shell: python
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_CANDIDATE: ${{ needs.changes.outputs.run_candidate }}
          DOCS_ONLY: ${{ needs.changes.outputs.docs_only }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          DOCS_RESULT: ${{ needs['docs-only'].result }}
          TEST_RESULT: ${{ needs.test.result }}
          NON_DEV_RESULT: ${{ needs['non-dev-smoke'].result }}
          LLM_DECIDE_RESULT: ${{ needs['llm-decide-smoke'].result }}
          ONBOARDING_RESULT: ${{ needs['onboarding-smoke'].result }}
          DOCX_RESULT: ${{ needs['docx-smoke'].result }}
          GOLDEN_RESULT: ${{ needs['golden-smoke'].result }}
        run: |
          import os

          results = {
              "changes": os.environ.get("CHANGES_RESULT", ""),
              "docs-only": os.environ.get("DOCS_RESULT", ""),
              "test": os.environ.get("TEST_RESULT", ""),
              "non-dev-smoke": os.environ.get("NON_DEV_RESULT", ""),
              "llm-decide-smoke": os.environ.get("LLM_DECIDE_RESULT", ""),
              "onboarding-smoke": os.environ.get("ONBOARDING_RESULT", ""),
              "docx-smoke": os.environ.get("DOCX_RESULT", ""),
              "golden-smoke": os.environ.get("GOLDEN_RESULT", ""),
          }

          def require(expected: dict[str, str]) -> None:
              mismatches = {
                  name: {"expected": wanted, "actual": results.get(name, "")}
                  for name, wanted in expected.items()
                  if results.get(name) != wanted
              }
              if mismatches:
                  raise SystemExit(f"Merge gate dependency mismatch: {mismatches}")

          require({"changes": "success"})
          run_candidate = os.environ.get("RUN_CANDIDATE", "")
          docs_only = os.environ.get("DOCS_ONLY", "")
          heavy_jobs = {
              "test": "success",
              "non-dev-smoke": "success",
              "llm-decide-smoke": "success",
              "onboarding-smoke": "success",
              "docx-smoke": "success",
              "golden-smoke": "success",
          }

          if os.environ.get("EVENT_NAME") == "pull_request" and run_candidate == "false":
              require({
                  "docs-only": "skipped",
                  **{name: "skipped" for name in heavy_jobs},
              })
              print("Draft PR: heavy candidate gate intentionally not run.")
          elif run_candidate != "true":
              raise SystemExit("Merge gate did not receive a candidate classification.")
          elif docs_only == "true":
              require({
                  "docs-only": "success",
                  **{name: "skipped" for name in heavy_jobs},
              })
              print("Docs-only candidate route passed.")
          elif docs_only == "false":
              require({"docs-only": "skipped", **heavy_jobs})
              print("Full supported-platform candidate route passed.")
          else:
              raise SystemExit("Merge gate did not receive a docs-only classification.")
